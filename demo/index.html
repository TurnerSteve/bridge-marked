<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>marked-bridge — Live Demo</title>
  <link rel="stylesheet" href="../src/style.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #052e16;
      color: white;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
    }
    header h1 { font-size: 16px; font-weight: 600; }
    header a { color: #86efac; text-decoration: none; }
    header a:hover { text-decoration: underline; }
    .container {
      flex: 1;
      display: flex;
      min-height: 0;
    }
    .editor-pane, .preview-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .pane-header {
      background: #f3f4f6;
      border-bottom: 1px solid #e5e7eb;
      padding: 6px 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6b7280;
    }
    textarea {
      flex: 1;
      border: none;
      outline: none;
      resize: none;
      padding: 16px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 13px;
      line-height: 1.5;
      background: #1e1e1e;
      color: #d4d4d4;
    }
    .preview-pane {
      border-left: 1px solid #e5e7eb;
    }
    .preview-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      font-size: 14px;
      line-height: 1.6;
    }
    .preview-content h1 { font-size: 1.5em; margin: 0.5em 0 0.3em; }
    .preview-content h2 { font-size: 1.2em; margin: 0.8em 0 0.3em; color: #374151; }
    .preview-content p { margin: 0.5em 0; }
    .preview-content ul { margin: 0.5em 0; padding-left: 1.5em; }
    .preview-content code { background: #f3f4f6; padding: 2px 4px; border-radius: 3px; font-size: 0.9em; }
    .preview-content a { color: #2563eb; }
    .preview-content .bridge-block { margin: 12px 0; }
  </style>
</head>
<body>
  <header>
    <h1>marked-bridge</h1>
    <span>Live Demo — Bridge Markdown Extension</span>
    <a href="https://github.com/TurnerSteve/bridge-marked" target="_blank">GitHub</a>
  </header>
  <div class="container">
    <div class="editor-pane">
      <div class="pane-header">Markdown</div>
      <textarea id="editor" spellcheck="false"></textarea>
    </div>
    <div class="preview-pane">
      <div class="pane-header">Preview</div>
      <div class="preview-content" id="preview"></div>
    </div>
  </div>

  <script type="module">
    import { marked } from 'https://cdn.jsdelivr.net/npm/marked@15/lib/marked.esm.js';

    // SVG utilities and renderers (extracted from bridge-forge sidecar-bridge-render)
    const SUIT_COLOR = { S: '#1d4ed8', H: '#dc2626', D: '#ea580c', C: '#111827' };
    const SUIT_GLYPH = { S: '♠', H: '♥', D: '♦', C: '♣' };
    
    function x(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function handWidth(hand, label) {
      const suits = ['S', 'H', 'D', 'C'];
      const maxCards = Math.max(...suits.map(s => (hand[s] || '—').length));
      const textW = 12 + 7.2 + maxCards * 7.2;
      const labelW = label.length * 7;
      return Math.ceil(Math.max(textW, labelW) + 7);
    }

    function handElements(ox, oy, hand, label, w, h = 90) {
      const width = w ?? handWidth(hand, label);
      const suits = ['S', 'H', 'D', 'C'];
      const rowH = Math.floor((h - 22) / 4);
      const rows = suits.map((s, i) => {
        const ry = oy + 22 + i * rowH + rowH - 4;
        const cards = hand[s] || '—';
        return `  <text x="${ox + 7}" y="${ry}" font-family="'Courier New',monospace" font-size="12">` +
          `<tspan fill="${SUIT_COLOR[s]}" font-weight="bold">${SUIT_GLYPH[s]}</tspan>` +
          `<tspan fill="#374151"> ${x(cards)}</tspan></text>`;
      }).join('\n');
      return `  <rect x="${ox}" y="${oy}" width="${width}" height="${h}" rx="5" fill="white" stroke="#e2e8f0" stroke-width="1"/>\n` +
        `  <text x="${ox + 7}" y="${oy + 14}" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#111827">${x(label)}</text>\n` + rows;
    }

    function renderHandSvg(input) {
      const label = input.label ?? 'Hand';
      const H = 90;
      const W = Math.max(90, 50 + (input.cards.S.length * 7.2 + 12));
      return `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" class="bridge-hand-svg" style="border: 1px solid #e5e7eb; border-radius: 4px;">\n` +
        handElements(0, 0, input.cards, label, W, H) + '\n</svg>';
    }

    function renderDealSvg(input) {
      const HW = 155, HH = 90, gapX = 30, gapY = 12, labelH = 18;
      const view = (input.view || 'all').toLowerCase();

      if (view === 'ns') {
        const totalW = HW;
        const totalH = labelH + HH * 2 + gapY + 8;
        const northY = labelH;
        const southY = northY + HH + gapY;
        const labelParts = [];
        if (input.label) labelParts.push(x(input.label));
        if (input.dealer) labelParts.push(`Dealer: ${x(input.dealer)}`);
        const titleEl = labelParts.length ? `  <text x="${totalW / 2}" y="13" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#6b7280" text-anchor="middle">${labelParts.join(' · ')}</text>` : '';
        return [
          `<svg xmlns="http://www.w3.org/2000/svg" width="${totalW}" height="${totalH}" class="bridge-deal-svg" style="border: 1px solid #e5e7eb; border-radius: 4px;">`,
          titleEl,
          handElements(0, northY, input.hands.North, 'North', HW, HH),
          handElements(0, southY, input.hands.South, 'South', HW, HH),
          '</svg>'
        ].filter(Boolean).join('\n');
      }

      if (view === 'ew') {
        const totalW = HW * 2 + gapX;
        const totalH = labelH + HH + 8;
        const labelParts = [];
        if (input.label) labelParts.push(x(input.label));
        if (input.dealer) labelParts.push(`Dealer: ${x(input.dealer)}`);
        const titleEl = labelParts.length ? `  <text x="${totalW / 2}" y="13" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#6b7280" text-anchor="middle">${labelParts.join(' · ')}</text>` : '';
        return [
          `<svg xmlns="http://www.w3.org/2000/svg" width="${totalW}" height="${totalH}" class="bridge-deal-svg" style="border: 1px solid #e5e7eb; border-radius: 4px;">`,
          titleEl,
          handElements(0, labelH, input.hands.West, 'West', HW, HH),
          handElements(HW + gapX, labelH, input.hands.East, 'East', HW, HH),
          '</svg>'
        ].filter(Boolean).join('\n');
      }

      const row2W = HW * 2 + gapX;
      const northX = Math.round((row2W - HW) / 2);
      const northY = labelH, row2Y = northY + HH + gapY, southY = row2Y + HH + gapY;
      const totalW = row2W, totalH = southY + HH + 8;
      const labelParts = [];
      if (input.label) labelParts.push(x(input.label));
      if (input.dealer) labelParts.push(`Dealer: ${x(input.dealer)}`);
      const titleEl = labelParts.length ? `  <text x="${totalW / 2}" y="13" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#6b7280" text-anchor="middle">${labelParts.join(' · ')}</text>` : '';
      return [
        `<svg xmlns="http://www.w3.org/2000/svg" width="${totalW}" height="${totalH}" class="bridge-deal-svg" style="border: 1px solid #e5e7eb; border-radius: 4px;">`,
        titleEl,
        handElements(northX, northY, input.hands.North, 'North', HW, HH),
        handElements(0, row2Y, input.hands.West, 'West', HW, HH),
        handElements(HW + gapX, row2Y, input.hands.East, 'East', HW, HH),
        handElements(northX, southY, input.hands.South, 'South', HW, HH),
        '</svg>'
      ].filter(Boolean).join('\n');
    }

    function renderBiddingSvg(input) {
      const rounds = input.rounds ?? [];
      const seats = (input.seats || 'NESW').toUpperCase();
      const cols = seats === 'NS' ? ['N', 'S'] : seats === 'EW' ? ['E', 'W'] : ['N', 'E', 'S', 'W'];
      const TOTAL_W = cols.length * 46;
      const HEADER_H = 22, ROW_H = 18;
      const labelH = (input.label || input.dealer) ? 18 : 0;
      const totalH = labelH + HEADER_H + rounds.length * ROW_H + 2;
      const labelParts = [];
      if (input.label) labelParts.push(x(input.label));
      if (input.dealer) labelParts.push(`Dealer: ${x(input.dealer)}`);
      const titleEl = labelParts.length ? `  <text x="${TOTAL_W / 2}" y="13" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#6b7280" text-anchor="middle">${labelParts.join(' · ')}</text>` : '';

      let cx = 0;
      const headerCells = cols.map((label) => {
        const w = 46;
        const result = `  <rect x="${cx}" y="${labelH}" width="${w}" height="${HEADER_H}" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="0.5"/>\n` +
          `  <text x="${cx + w / 2}" y="${labelH + HEADER_H - 6}" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#374151" text-anchor="middle">${label}</text>`;
        cx += w;
        return result;
      }).join('\n');

      const dataCells = rounds.map((round, ri) => {
        let cx = 0;
        const ry = labelH + HEADER_H + ri * ROW_H;
        const bg = ri % 2 === 0 ? 'white' : '#f9fafb';
        const values = cols.map((seat) => {
          const map = { N: round.north || '—', E: round.east || '—', S: round.south || '—', W: round.west || '—' };
          return map[seat] ?? '—';
        });
        return cols.map((_, ci) => {
          const w = 46;
          const result = `  <rect x="${cx}" y="${ry}" width="${w}" height="${ROW_H}" fill="${bg}" stroke="#e5e7eb" stroke-width="0.5"/>\n` +
            `  <text x="${cx + w / 2}" y="${ry + ROW_H - 4}" font-family="'Courier New',monospace" font-size="11" fill="#374151" text-anchor="middle">${x(values[ci])}</text>`;
          cx += w;
          return result;
        }).join('\n');
      }).join('\n');

      return [
        `<svg xmlns="http://www.w3.org/2000/svg" width="${TOTAL_W}" height="${totalH}" class="bridge-bidding-svg" style="border: 1px solid #e5e7eb; border-radius: 4px;">`,
        titleEl,
        headerCells,
        dataCells,
        '</svg>'
      ].filter(Boolean).join('\n');
    }

    // Inline the bridge extension
    const BRIDGE_TYPES = new Set(['hand', 'hands', 'deal', 'auction', 'bidding', 'pairbidding']);

    function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function cardsFromString(s) {
      const p = s.split('.');
      return { S: (p[0]??'').replace(/10/g,'T').toUpperCase(), H: (p[1]??'').replace(/10/g,'T').toUpperCase(), D: (p[2]??'').replace(/10/g,'T').toUpperCase(), C: (p[3]??'').replace(/10/g,'T').toUpperCase() };
    }

    function boardInfo(n) {
      const d = ['N','E','S','W'][(n-1)%4];
      const v = ['None','NS','EW','All','NS','EW','All','None','EW','All','None','NS','All','None','NS','EW'];
      return { dealer: d, vul: v[(n-1)%16] };
    }

    function parseBridgeBlock(type, raw) {
      const trimmed = raw.trim();
      if (trimmed.startsWith('{')) return JSON.parse(trimmed);

      const lines = trimmed.split('\n').map(l => l.trim()).filter(Boolean);
      function kv(line) { const m = line.match(/^([a-zA-Z]\w*)\s*:\s*(.*)$/); return m ? { key: m[1].toLowerCase(), value: m[2].trim() } : null; }

      if (type === 'hand') {
        const ci = trimmed.lastIndexOf(':');
        if (ci === -1) return { cards: cardsFromString(trimmed) };
        return { label: trimmed.slice(0,ci).trim(), cards: cardsFromString(trimmed.slice(ci+1).trim()) };
      }

      if (type === 'hands') {
        const data = { hands: [] };
        for (const line of lines) {
          const k = kv(line);
          if (k?.key === 'title') { data.title = k.value; continue; }
          if (k?.key === 'perrow') { data.perRow = parseInt(k.value)||4; continue; }
          const ci = line.lastIndexOf(':');
          if (ci === -1) data.hands.push({ cards: cardsFromString(line) });
          else data.hands.push({ label: line.slice(0,ci).trim(), cards: cardsFromString(line.slice(ci+1).trim()) });
        }
        return data;
      }

      if (type === 'deal') {
        const data = { hands: { North:{S:'',H:'',D:'',C:''}, East:{S:'',H:'',D:'',C:''}, South:{S:'',H:'',D:'',C:''}, West:{S:'',H:'',D:'',C:''} } };
        const bids = [];
        for (const line of lines) {
          const k = kv(line);
          if (!k) { const t = line.split(/\s+/); if (t.length>=2) bids.push({north:t[0]??'',east:t[1]??'',south:t[2]??'',west:t[3]??''}); continue; }
          switch(k.key) {
            case 'label': data.label = k.value; break;
            case 'board': data.boardNumber = parseInt(k.value); break;
            case 'dealer': data.dealer = k.value.toUpperCase(); break;
            case 'view': data.view = k.value; break;
            case 'annotations': data.showAnnotations = k.value!=='off'&&k.value!=='false'; break;
            case 'n': case 'north': data.hands.North = cardsFromString(k.value); break;
            case 'e': case 'east': data.hands.East = cardsFromString(k.value); break;
            case 's': case 'south': data.hands.South = cardsFromString(k.value); break;
            case 'w': case 'west': data.hands.West = cardsFromString(k.value); break;
            case 'ann': { const p=k.value.indexOf('|'); if(p!==-1){if(!data.annotations)data.annotations=[];data.annotations.push({bid:k.value.slice(0,p).trim(),meaning:k.value.slice(p+1).trim()});} break; }
          }
        }
        if (bids.length) data.bidding = bids;
        return data;
      }

      // auction / bidding / pairbidding
      let seats = type==='pairbidding'?'NS':'NESW';
      for (const line of lines) { const k=kv(line); if(k?.key==='seats'){seats=k.value.toUpperCase();break;} }
      const data = { label:'', seats, rounds:[] };
      for (const line of lines) {
        const k = kv(line);
        if (!k) {
          const t = line.split(/\s+/);
          if (seats==='NS') data.rounds.push({north:t[0]??'',east:'',south:t[1]??'',west:''});
          else if (seats==='EW') data.rounds.push({north:'',east:t[0]??'',south:'',west:t[1]??''});
          else data.rounds.push({north:t[0]??'',east:t[1]??'',south:t[2]??'',west:t[3]??''});
          continue;
        }
        switch(k.key) {
          case 'label': data.label=k.value; break;
          case 'seats': data.seats=k.value.toUpperCase(); seats=data.seats; break;
          case 'board': data.boardNumber=parseInt(k.value); break;
          case 'dealer': data.dealer=k.value.toUpperCase(); break;
          case 'vul': data.vul=k.value; break;
          case 'n': case 'north': case 'h1': data.hand1=cardsFromString(k.value); break;
          case 's': case 'south': case 'e': case 'east': case 'w': case 'west': case 'h2': data.hand2=cardsFromString(k.value); break;
          case 'ann': { const p=k.value.indexOf('|'); if(p!==-1){if(!data.annotations)data.annotations=[];data.annotations.push({bid:k.value.slice(0,p).trim(),meaning:k.value.slice(p+1).trim()});} break; }
          case 'nextlabel': data.nextBidsLabel=k.value; break;
          case 'next': { const p=k.value.indexOf('|'); if(p!==-1){if(!data.nextBids)data.nextBids=[];data.nextBids.push({bid:k.value.slice(0,p).trim(),meaning:k.value.slice(p+1).trim()});} break; }
        }
      }
      return data;
    }

    function renderHands(data) {
      const title = data.title ? `<div class="bridge-hands-title">${esc(data.title)}</div>` : '';
      const hands = data.hands.map(h => renderHandSvg(h)).join('');
      return `<div class="bridge-hands" style="display: flex; flex-wrap: wrap; gap: 12px;">${title}${hands}</div>`;
    }

    // Register extension
    marked.use({
      renderer: {
        code(token) {
          const lang = token.lang?.toLowerCase();
          if (!lang || !BRIDGE_TYPES.has(lang)) return false;
          try {
            const data = parseBridgeBlock(lang, token.text);
            switch (lang) {
              case 'hand': return renderHandSvg(data);
              case 'hands': return renderHands(data);
              case 'deal': {
                const dealer = data.dealer ?? 'N';
                const svg = renderDealSvg({ label: data.label, dealer, view: data.view, hands: data.hands });
                let bidding = '';
                if (data.bidding?.length) {
                  const rounds = data.bidding.map(r => ({ north: r.north || '', south: r.south || '', east: r.east || '', west: r.west || '' }));
                  bidding = renderBiddingSvg({ dealer, rounds });
                }
                return `<div class="bridge-block bridge-deal" style="margin: 12px 0;">${svg}${bidding ? `<div style="margin-top: 12px;">${bidding}</div>` : ''}</div>`;
              }
              case 'auction': case 'bidding': case 'pairbidding': {
                const rounds = data.rounds.map(r => ({ north: r.north || '', south: r.south || '', east: r.east || '', west: r.west || '' }));
                return `<div class="bridge-block bridge-auction" style="margin: 12px 0;">${renderBiddingSvg({ label: data.label, dealer: data.dealer, seats: data.seats, rounds })}</div>`;
              }
            }
          } catch (e) {
            return `<div class="bridge-error">Failed to render ${lang} block: ${e.message}</div>`;
          }
          return false;
        }
      }
    });

    // Load example and wire up
    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');

    function render() {
      preview.innerHTML = marked.parse(editor.value);
    }

    editor.addEventListener('input', render);

    // Load example.md
    fetch('example.md')
      .then(r => r.text())
      .then(text => { editor.value = text; render(); })
      .catch(() => { editor.value = '# Type bridge markdown here\n\n```hand\nNorth: AKQ.432.876.J543\n```'; render(); });
  </script>
</body>
</html>
